; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; PlatformIO defaults test_dir to "test", which would collide with our /test/
; folder full of hardware test modules. Rename it so `pio test` does not try
; to compile them as unit tests.
test_dir = unit_tests

[env:nucleo_f446re]
; Environment configuration for the Nucleo F446RE board

platform = ststm32           ; Use the STM32 platform
board = nucleo_f446re        ; Specify the Nucleo F446RE board
framework = mbed             ; Use the Mbed OS framework
;upload_protocol = mbed       ; Use Mbed upload method

upload_protocol = stlink     ; Use ST-Link upload method

monitor_speed = 115200       ; Match platform.stdio-baud-rate in mbed_app.json

; Custom build flags specific to your project
build_flags =
  -DEIGEN_NO_DEBUG           ; Disable Eigen's internal debugging checks to reduce overhead
  -DEIGEN_DONT_VECTORIZE     ; Disable Eigen's vectorization to ensure compatibility and reduce code size
  -I$PROJECT_INCLUDE_DIR     ; Include the project's 'include' directory in the compiler's header search paths
  -I$PROJECT_DIR/test        ; Include /test/ for test_*.h headers
  -I$PROJECT_DIR/calibration ; Include /calibration/ for calib_*.h + calibration_values.h

; Pull /test/ and /calibration/ into the build alongside src/
; Patterns are relative to src_dir (default = src).
build_src_filter =
  +<*>
  +<../test/*.cpp>
  +<../calibration/*.cpp>

